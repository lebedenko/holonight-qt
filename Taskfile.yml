version: "3"

vars:
  BUILD_DIR: build
  RELEASE_BUILD_DIR: build-release
  NPROC:
    sh: nproc

tasks:
  configure:
    desc: Configure (Debug + tests)
    cmds:
      - cmake -B {{.BUILD_DIR}} -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
    sources:
      - CMakeLists.txt
      - "*/CMakeLists.txt"
    generates:
      - "{{.BUILD_DIR}}/build.ninja"

  configure:release:
    desc: Configure (Release)
    cmds:
      - |
        if [ -f "{{.RELEASE_BUILD_DIR}}/CMakeCache.txt" ] && ! grep -Fxq "CMAKE_HOME_DIRECTORY:INTERNAL={{.TASKFILE_DIR}}" "{{.RELEASE_BUILD_DIR}}/CMakeCache.txt"; then
          cmake -E echo "Removing stale {{.RELEASE_BUILD_DIR}} CMake cache from another source directory"
          cmake -E rm -rf "{{.RELEASE_BUILD_DIR}}"
        fi
      - cmake -S . -B {{.RELEASE_BUILD_DIR}} -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

  configure:demo:
    desc: Configure (Debug + demo app)
    cmds:
      - cmake -B {{.BUILD_DIR}} -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_DEMO=ON

  build:
    desc: Build
    deps: [configure]
    cmds:
      - cmake --build {{.BUILD_DIR}} -j{{.NPROC}}

  build:release:
    desc: Build (Release)
    deps: [configure:release]
    cmds:
      - cmake --build {{.RELEASE_BUILD_DIR}} -j{{.NPROC}}

  test:
    desc: Run tests (headless)
    deps: [build]
    cmds:
      - QT_QPA_PLATFORM=offscreen ctest --test-dir {{.BUILD_DIR}} --output-on-failure

  lint:
    desc: Run clang-tidy
    cmds:
      - run-clang-tidy -p {{.BUILD_DIR}}

  verify:
    desc: Build + lint + test (pre-commit checklist)
    cmds:
      - task: build
      - task: lint
      - task: test

  colors:generate:
    desc: Regenerate KDE color scheme from palette tokens
    deps: [build]
    cmds:
      - ./{{.BUILD_DIR}}/tools/generate_holonight_colors data/holonight.colors

  install:local:
    desc: Install to ~/.local (no sudo)
    deps: [build]
    cmds:
      - cmake --install {{.BUILD_DIR}} --prefix ~/.local

  install:local:release:
    desc: Install Release build to ~/.local (for desktop apps)
    deps: [build:release]
    cmds:
      - cmake --install {{.RELEASE_BUILD_DIR}} --prefix ~/.local

  install:system:
    desc: Install to /usr (requires sudo)
    deps: [build:release]
    cmds:
      - sudo cmake --install {{.RELEASE_BUILD_DIR}} --prefix /usr

  demo:
    desc: Build and run the visual demo app (from build tree, no platform theme)
    cmds:
      - cmake -B {{.BUILD_DIR}} -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_DEMO=ON
      - cmake --build {{.BUILD_DIR}} -j{{.NPROC}} --target holonight_demo
      - QT_QPA_PLATFORMTHEME=holonight ./{{.BUILD_DIR}}/demo/holonight_demo {{.CLI_ARGS}}

  demo:install:
    desc: Build, install demo + theme to ~/.local, then run with full platform theme
    cmds:
      - cmake -B {{.BUILD_DIR}} -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_DEMO=ON
      - cmake --build {{.BUILD_DIR}} -j{{.NPROC}}
      - cmake --install {{.BUILD_DIR}} --prefix ~/.local
      - QT_QPA_PLATFORMTHEME=holonight ~/.local/bin/holonight_demo {{.CLI_ARGS}}


  clean:
    desc: Remove build directory
    cmds:
      - rm -rf {{.BUILD_DIR}}
